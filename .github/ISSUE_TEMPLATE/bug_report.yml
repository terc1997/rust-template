name: 🐛 Bug Report
description: File a bug report
labels: [Bug Report]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: input
    id: version
    attributes:
      label: Collection version
      description: Provide the version of the Rust Build System being used
      placeholder: Please use the full version, avoid "latest"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment information
      description: |
        If you are using the Rust Build System CLI please provide the version used, if you are running in Github Actions please provide the output from the commands listed below instead.
      placeholder: |
        $ rust --version
      render: console
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: |
        Describe clearly and concisely the bug including instructions showing how to reproduce it.
      placeholder: |
        Please add as many details as possible to avoid assumptions from our side. How do you trigger this bug? What role or playbook were you using?  What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: |
        Please copy and paste any relevant log output
      render: shell
    validations:
      required: true
